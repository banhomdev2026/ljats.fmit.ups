<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ລະບົບສະແກນ ແລະ ບັນທຶກຂໍ້ມູນບາໂຄດ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTML5 QRCode Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- SweetAlert2 สำหรับแจ้งเตือน -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f3f4f6; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; border: none !important; }
        #reader video { object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-xl font-semibold">ສະແກນບາໂຄດ / QR Code</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 max-w-md mx-auto w-full flex flex-col gap-4">
       
        <!-- Scanner Area -->
        <div class="bg-white p-2 rounded-xl shadow-sm relative">
            <div id="reader"></div>
            <p class="text-center text-sm text-gray-500 mt-2">ຫັນກ້ອງໃສ່ບາໂຄດເພື່ອສະແກນອັດຕະໂນມັດ</p>
        </div>

        <!-- Manual Input Area -->
        <div class="bg-white p-4 rounded-xl shadow-sm flex flex-col gap-3">
            <label class="text-sm font-medium text-gray-700">ປ້ອນລະຫັດບາໂຄດດ້ວຍຕົນເອງ</label>
            <input type="text" id="manualBarcode" placeholder="ລະບຸລະຫັດບາໂຄດ..."
                   class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <button onclick="handleManualSearch()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                    ຄົ້ນຫາ / ຕົກລົງ
                </button>
                <button onclick="showDataInfo()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-300 transition">
                    ຂໍ້ມູນ
                </button>
            </div>
        </div>
    </main>

    <!-- Modal (Pop-up) -->
    <div id="dataModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold">ບັນທຶກຂໍ້ມູນ</h2>
                <button onclick="closeModal()" class="text-white hover:text-gray-200 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
           
            <div class="p-5 overflow-y-auto flex-grow space-y-4">
                <form id="dataForm" onsubmit="saveData(event)">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ລະຫັດບາໂຄດ</label>
                        <input type="text" id="modalBarcode" required readonly
                               class="w-full border border-gray-300 rounded-lg p-2.5 bg-gray-50 text-gray-600">
                    </div>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ວັນທີ</label>
                        <input type="date" id="modalDate" required
                               class="w-full border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ສະຖານະ</label>
                        <select id="modalStatus" required
                                class="w-full border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="ສຳເລັດ">ສຳເລັດ (Success)</option>
                            <option value="ເກີດບັນຫາ">ເກີດບັນຫາ (Issue)</option>
                        </select>
                    </div>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ລາຍລະອຽດ/ເນື້ອຫາ</label>
                        <textarea id="modalDetails" rows="3" placeholder="ລະບຸລາຍລະອຽດເພີ່ມເຕີມ..."
                                  class="w-full border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <div class="mt-6 flex gap-3">
                        <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-lg font-medium hover:bg-gray-200 transition">ປິດ</button>
                        <button type="submit" id="saveBtn" class="flex-1 bg-green-600 text-white py-2.5 rounded-lg font-medium hover:bg-green-700 transition flex justify-center items-center">ບັນທຶກຂໍ້ມູນ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrUPrarh-dlhLtPFr9yJFYZk3Qz7lYqL9qNNUx7IyS_xIAKaXOW0EBv4prJPqbG_63/exec';
        let isScanning = true;

        document.addEventListener("DOMContentLoaded", () => {
            initScanner();
            setCurrentDate();
        });

        function initScanner() {
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (!isScanning) return;
                    isScanning = false;
                    openModal(decodedText);
                },
                (errorMessage) => {}
            ).catch((err) => {
                console.error("ກ້ອງບໍ່ສາມາດໃຊ້ງານໄດ້:", err);
            });
        }

        function handleManualSearch() {
            const inputVal = document.getElementById('manualBarcode').value.trim();
            if(inputVal === '') {
                Swal.fire({ icon: 'warning', title: 'ກະລຸນາໃສ່ລະຫັດບາໂຄດ', text: 'ທ່ານຕ້ອງປ້ອນລະຫັດກ່ອນກົດຄົ້ນຫາ', confirmButtonText: 'ຕົກລົງ' });
                return;
            }
            openModal(inputVal);
            document.getElementById('manualBarcode').value = '';
        }

        function openModal(barcodeData) {
            document.getElementById('dataModal').classList.remove('hidden');
            document.getElementById('modalBarcode').value = barcodeData;
            setCurrentDate();
            document.getElementById('modalStatus').value = 'ສຳເລັດ';
            document.getElementById('modalDetails').value = '';
        }

        function closeModal() {
            document.getElementById('dataModal').classList.add('hidden');
            setTimeout(() => { isScanning = true; }, 1000);
        }

        function setCurrentDate() {
            const today = new Date();
            const dateString = today.getFullYear() + '-' +
                               String(today.getMonth() + 1).padStart(2, '0') + '-' +
                               String(today.getDate()).padStart(2, '0');
            document.getElementById('modalDate').value = dateString;
        }

        async function saveData(event) {
            event.preventDefault();
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            const formData = new URLSearchParams();
            formData.append('action', 'insert');
            formData.append('barcode', document.getElementById('modalBarcode').value);
            formData.append('date', document.getElementById('modalDate').value);
            formData.append('status', document.getElementById('modalStatus').value);
            formData.append('details', document.getElementById('modalDetails').value);

            try {
                btn.disabled = true;
                btn.innerHTML = `ກຳລັງບັນທຶກ...`;
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'ບັນທຶກສຳເລັດ!', timer: 2000, showConfirmButton: false });
                    closeModal();
                } else { throw new Error(); }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'ບັນທຶກບໍ່ສຳເລັດ', text: 'ກະລຸນາກວດສອບການເຊື່ອມຕໍ່ອິນເຕີເນັດ' });
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function showDataInfo() {
            Swal.fire({ title: 'ຂໍ້ມູນລະບົບ', icon: 'info', confirmButtonText: 'ປິດ' });
        }
    </script>
</body>
</html>
